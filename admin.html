<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — SAAGWAAN</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;200;300;400&display=swap" rel="stylesheet"/></head>
<body>

<div class="admin-login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="SAAGWAAN" />
      <span class="logo-text">SAAG<span class="logo-w">W</span>AAN</span>
      <span class="login-eyebrow">Administration</span>
    </div>

    <h1 class="login-title">Sign In</h1>

    <div class="login-error" id="loginError"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="admin@saagwaan.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" />
    </div>

    <button class="btn-primary login-btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  // Redirect if already logged in
  (async () => {
    await new Promise(r => setTimeout(r, 100));
    const session = await getSession();
    if (session) window.location.href = 'admin-dashboard.html';
  })();

  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');

    errEl.classList.remove('visible');

    if (!email || !password) {
      errEl.textContent = 'Please enter your email and password.';
      errEl.classList.add('visible');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      errEl.textContent = 'Invalid credentials. Please try again.';
      errEl.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    } else {
      window.location.href = 'admin-dashboard.html';
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
