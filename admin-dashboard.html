<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — SAAGWAAN Admin</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;200;300;400&display=swap" rel="stylesheet"/></head>
<body>

<div class="dash-layout">

  <!-- SIDEBAR -->
  <aside class="dash-sidebar">
    <div class="sidebar-brand">
      <img src="logo.png" alt="SAAGWAAN" />
      <span class="logo-text">SAAG<span class="logo-w">W</span>AAN</span>
    </div>
    <div class="sidebar-label">Management</div>
    <nav class="sidebar-nav">
      <button class="sidebar-link active" onclick="showPanel('products')" id="nav-products">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="2" y="3" width="20" height="14" rx="1"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Products
      </button>
      <button class="sidebar-link" onclick="showPanel('categories')" id="nav-categories">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        Categories
      </button>
      <a href="index.html" class="sidebar-link" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
        View Site
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebarUser"></div>
      <button class="btn-ghost small sidebar-signout" onclick="handleLogout()">Sign Out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="dash-main">
    <div class="dash-topbar">
      <h1 id="panelTitle">Products</h1>

    </div>

    <div class="dash-content">

      <!-- PRODUCTS PANEL -->
      <div class="dash-panel active" id="panel-products">
        <div class="dash-stats" id="dashStats">
          <div class="dash-stat"><div class="dash-stat-num" id="statTotal">—</div><div class="dash-stat-label">Total Products</div></div>
          <div class="dash-stat"><div class="dash-stat-num" id="statFeatured">—</div><div class="dash-stat-label">Featured</div></div>
          <div class="dash-stat"><div class="dash-stat-num" id="statCategories">—</div><div class="dash-stat-label">Categories</div></div>
          <div class="dash-stat"><div class="dash-stat-num" id="statNoPhoto">—</div><div class="dash-stat-label">No Photo</div></div>
        </div>

        <div class="dash-table-wrap">
          <div class="dash-table-header">
            <h2>All Products</h2>
            <div class="dash-table-actions">
              <select id="filterCat" onchange="renderProductTable()" class="dash-filter-select">
                <option value="all">All Categories</option>
              </select>
            </div>
          </div>
          <div id="productTableWrap"></div>
        </div>
      </div>

      <!-- CATEGORIES PANEL -->
      <div class="dash-panel" id="panel-categories">
        <div class="dash-table-wrap dash-table-wrap-spaced">
          <div class="dash-table-header">
            <h2>Categories</h2>
          </div>
          <div id="catListWrap"></div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="prodOverlay" onclick="closeProductModal()"></div>
<div class="modal modal-wide" id="prodModal">
  <button class="modal-close" onclick="closeProductModal()">&#x2715;</button>
  <h2 class="modal-title" id="prodModalTitle">Add Product</h2>
  <div class="modal-form">
    <input type="hidden" id="editProductId" value="" />
    <div class="form-row">
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" id="pName" placeholder="e.g. King Size Sheesham Bed" />
      </div>
      <div class="form-group">
        <label>Category *</label>
        <select id="pCategory"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Price (Rs.)</label>
        <input type="number" id="pPrice" placeholder="e.g. 85000" />
      </div>
      <div class="form-group">
        <label>Material</label>
        <input type="text" id="pMaterial" placeholder="e.g. Solid Sheesham Wood" />
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="pDesc" rows="3" placeholder="Dimensions, finish, details..."></textarea>
    </div>
    <div class="form-group">
      <label>Notes (internal)</label>
      <textarea id="pNotes" rows="2" placeholder="Lead time, stock status, custom options..."></textarea>
    </div>
    <div class="form-group">
      <label>Product Photo</label>
      <div class="img-upload-area" onclick="document.getElementById('pPhoto').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        <span>Click to upload photo</span>
        <input type="file" id="pPhoto" accept="image/*" class="display-none" onchange="handlePhotoSelect(event)" />
      </div>
      <img id="photoPreview" class="img-preview-thumb" src="" alt="" />
      <input type="hidden" id="pPhotoUrl" value="" />
    </div>
    <div class="form-group form-group-inline">
      <input type="checkbox" id="pFeatured" class="featured-checkbox" />
      <div>
        <label class="featured-label">Show in Featured (homepage)</label>
        <div class="featured-note" id="featuredNote"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeProductModal()">Cancel</button>
      <button class="btn-primary" onclick="saveProduct()" id="saveProdBtn">Save Product</button>
    </div>
  </div>
</div>

<!-- CATEGORY MODAL -->
<div class="modal-overlay" id="catOverlay" onclick="closeCatModal()"></div>
<div class="modal small-modal" id="catModal">
  <button class="modal-close" onclick="closeCatModal()">&#x2715;</button>
  <h2 class="modal-title">Add Category</h2>
  <div class="modal-form">
    <div class="form-group">
      <label>Category Name *</label>
      <input type="text" id="catName" placeholder="e.g. Outdoor Furniture" />
    </div>
    <div class="form-group">
      <label>Slug (URL-safe) *</label>
      <input type="text" id="catSlug" placeholder="e.g. outdoor" />
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeCatModal()">Cancel</button>
      <button class="btn-primary" onclick="saveCategory()">Add Category</button>
    </div>
  </div>
</div>

<!-- FLOATING ACTION BUTTON -->
<div class="dash-fab">
  <button class="btn-primary" id="fabBtn" onclick="fabAction()">+ Add Product</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  let allProducts = [];
  let allCategories = [];
  let selectedPhotoFile = null;

  // Auth check — wait for Supabase to restore session from storage
  (async () => {
    // Small delay to allow SDK to restore persisted session
    await new Promise(r => setTimeout(r, 100));
    const session = await getSession();
    if (!session) {
      window.location.href = 'admin.html';
      return;
    }
    document.getElementById('sidebarUser').textContent = session.user.email;
    await loadCategories();
    await loadProducts();
    renderProductTable();
    renderCategoryList();
  })();

  async function handleLogout() {
    await sb.auth.signOut();
    window.location.href = 'admin.html';
  }

  // PANEL NAVIGATION
  let currentPanel = 'products';

  function fabAction() {
    if (currentPanel === 'products') openProductModal();
    else openCatModal();
  }

  function showPanel(panel) {
    currentPanel = panel;
    document.querySelectorAll('.dash-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    document.getElementById('panel-' + panel).classList.add('active');
    document.getElementById('nav-' + panel).classList.add('active');
    const titles = { products: 'Products', categories: 'Categories' };
    document.getElementById('panelTitle').textContent = titles[panel];
    document.getElementById('fabBtn').textContent = panel === 'products' ? '+ Add Product' : '+ Add Category';
    // Also update topbarActions if it still exists
    const actions = document.getElementById('topbarActions');
    if (actions) actions.innerHTML = '';
  }

  // LOAD DATA
  async function loadCategories() {
    const { data, error } = await sb.from('categories').select('*').order('name');
    if (error) { showToast('Failed to load categories', 'error'); return; }
    allCategories = data || [];
    populateCategorySelects();
    renderCategoryList();
  }

  async function loadProducts() {
    const { data, error } = await sb.from('products').select('*').order('created_at', { ascending: false });
    if (error) { showToast('Failed to load products', 'error'); return; }
    allProducts = data || [];
    updateStats();
    renderProductTable();
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = allProducts.length;
    document.getElementById('statFeatured').textContent = allProducts.filter(p => p.featured).length;
    document.getElementById('statCategories').textContent = allCategories.length;
    document.getElementById('statNoPhoto').textContent = allProducts.filter(p => !p.photo_url).length;
  }

  function populateCategorySelects() {
    const sel = document.getElementById('pCategory');
    const filterSel = document.getElementById('filterCat');
    sel.innerHTML = allCategories.map(c => `<option value="${c.slug}">${c.name}</option>`).join('');
    filterSel.innerHTML = `<option value="all">All Categories</option>` +
      allCategories.map(c => `<option value="${c.slug}">${c.name}</option>`).join('');
  }

  function renderProductTable() {
    const filterEl = document.getElementById('filterCat');
    const cat = filterEl ? filterEl.value : 'all';
    const products = (!cat || cat === 'all') ? allProducts : allProducts.filter(p => p.category === cat);
    const wrap = document.getElementById('productTableWrap');
    if (!wrap) return;
    if (products.length === 0) {
      wrap.innerHTML = `<div class="loading-state">No products found.</div>`;
      return;
    }
    wrap.innerHTML = `<table>
      <thead><tr>
        <th></th>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Material</th>
        <th>Featured</th>
        <th>Actions</th>
      </tr></thead>
      <tbody>
        ${products.map(p => `<tr>
          <td class="td-thumb">${p.photo_url ? `<img src="${p.photo_url}" alt="${p.name}" />` : `<div class="no-img">No photo</div>`}</td>
          <td class="td-name">${p.name}</td>
          <td class="td-cat"><span>${catName(p.category)}</span></td>
          <td class="td-price">${p.price ? 'Starting from Rs. ' + Number(p.price).toLocaleString('en-IN') : '—'}</td>
          <td>${p.material || '—'}</td>
          <td class="td-featured"><span class="${p.featured ? 'badge-yes' : 'badge-no'}">${p.featured ? 'Yes' : 'No'}</span></td>
          <td>
            <div class="td-actions">
              <button class="icon-btn" onclick="editProduct('${p.id}')" title="Edit">&#x270E;</button>
              <button class="icon-btn danger" onclick="deleteProduct('${p.id}')" title="Delete">&#x2715;</button>
            </div>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  function renderCategoryList() {
    const wrap = document.getElementById('catListWrap');
    if (!wrap) return;
    if (allCategories.length === 0) {
      wrap.innerHTML = `<div class="loading-state">No categories. Add one above.</div>`;
      return;
    }
    wrap.innerHTML = `<div class="cat-list">
      ${allCategories.map(c => `<div class="cat-row">
        <div>
          <div class="cat-row-name">${c.name}</div>
          <div class="cat-row-slug">${c.slug}</div>
        </div>
        <button class="icon-btn danger" onclick="deleteCategory('${c.id}', '${c.slug}')" title="Delete">&#x2715;</button>
      </div>`).join('')}
    </div>`;
  }

  function catName(slug) {
    const cat = allCategories.find(c => c.slug === slug);
    return cat ? cat.name : slug;
  }

  // PRODUCT MODAL
  function openProductModal(product = null) {
    selectedPhotoFile = null;
    document.getElementById('editProductId').value = product ? product.id : '';
    document.getElementById('prodModalTitle').textContent = product ? 'Edit Product' : 'Add Product';
    document.getElementById('pName').value = product ? product.name : '';
    document.getElementById('pCategory').value = product ? product.category : (allCategories[0]?.slug || '');
    document.getElementById('pPrice').value = product ? (product.price || '') : '';
    document.getElementById('pMaterial').value = product ? (product.material || '') : '';
    document.getElementById('pDesc').value = product ? (product.description || '') : '';
    document.getElementById('pNotes').value = product ? (product.notes || '') : '';
    document.getElementById('pFeatured').checked = product ? !!product.featured : false;
    document.getElementById('pPhotoUrl').value = product ? (product.photo_url || '') : '';
    const preview = document.getElementById('photoPreview');
    if (product && product.photo_url) {
      preview.src = product.photo_url;
      preview.style.display = 'block';
    } else {
      preview.src = '';
      preview.style.display = 'none';
    }
    updateFeaturedNote();
    document.getElementById('prodModal').classList.add('open');
    document.getElementById('prodOverlay').classList.add('open');
  }

  function closeProductModal() {
    document.getElementById('prodModal').classList.remove('open');
    document.getElementById('prodOverlay').classList.remove('open');
  }

  function updateFeaturedNote() {
    const featured = allProducts.filter(p => p.featured);
    const note = document.getElementById('featuredNote');
    note.textContent = `${featured.length}/6 slots used on homepage`;
  }

  function handlePhotoSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    selectedPhotoFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      const preview = document.getElementById('photoPreview');
      preview.src = ev.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  async function uploadPhoto(file, productName) {
    const ext = file.name.split('.').pop();
    const filename = `${Date.now()}-${productName.replace(/\s+/g, '-').toLowerCase()}.${ext}`;
    const { data, error } = await sb.storage.from('product-photos').upload(filename, file, { upsert: true });
    if (error) throw error;
    const { data: urlData } = sb.storage.from('product-photos').getPublicUrl(filename);
    return urlData.publicUrl;
  }

  async function saveProduct() {
    const name = document.getElementById('pName').value.trim();
    const category = document.getElementById('pCategory').value;
    if (!name || !category) { showToast('Name and category are required.', 'error'); return; }

    const btn = document.getElementById('saveProdBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      let photoUrl = document.getElementById('pPhotoUrl').value;

      if (selectedPhotoFile) {
        photoUrl = await uploadPhoto(selectedPhotoFile, name);
      }

      // Check featured limit
      const featured = document.getElementById('pFeatured').checked;
      const editId = document.getElementById('editProductId').value;
      if (featured) {
        const currentFeatured = allProducts.filter(p => p.featured && p.id !== editId);
        if (currentFeatured.length >= 6) {
          showToast('Featured limit reached (6 max). Unfeature another product first.', 'error');
          btn.disabled = false;
          btn.textContent = 'Save Product';
          return;
        }
      }

      const payload = {
        name,
        category,
        price: document.getElementById('pPrice').value ? Number(document.getElementById('pPrice').value) : null,
        material: document.getElementById('pMaterial').value.trim() || null,
        description: document.getElementById('pDesc').value.trim() || null,
        notes: document.getElementById('pNotes').value.trim() || null,
        photo_url: photoUrl || null,
        featured
      };

      let error;
      if (editId) {
        ({ error } = await sb.from('products').update(payload).eq('id', editId));
      } else {
        ({ error } = await sb.from('products').insert([payload]));
      }

      if (error) throw error;

      showToast(editId ? 'Product updated.' : 'Product added.', 'success');
      closeProductModal();
      await loadProducts();
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Product';
    }
  }

  function editProduct(id) {
    const product = allProducts.find(p => p.id === id);
    if (product) openProductModal(product);
  }

  async function deleteProduct(id) {
    if (!confirm('Remove this product? This cannot be undone.')) return;
    const { error } = await sb.from('products').delete().eq('id', id);
    if (error) { showToast('Failed to delete.', 'error'); return; }
    showToast('Product removed.', 'success');
    await loadProducts();
  }

  // CATEGORY MODAL
  function openCatModal() {
    document.getElementById('catName').value = '';
    document.getElementById('catSlug').value = '';
    document.getElementById('catModal').classList.add('open');
    document.getElementById('catOverlay').classList.add('open');
  }

  function closeCatModal() {
    document.getElementById('catModal').classList.remove('open');
    document.getElementById('catOverlay').classList.remove('open');
  }

  document.getElementById('catName').addEventListener('input', e => {
    document.getElementById('catSlug').value = e.target.value.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  });

  async function saveCategory() {
    const name = document.getElementById('catName').value.trim();
    const slug = document.getElementById('catSlug').value.trim();
    if (!name || !slug) { showToast('Name and slug are required.', 'error'); return; }
    const { error } = await sb.from('categories').insert([{ name, slug }]);
    if (error) { showToast('Failed to add category. Slug may already exist.', 'error'); return; }
    showToast('Category added.', 'success');
    closeCatModal();
    await loadCategories();
  }

  async function deleteCategory(id, slug) {
    const inUse = allProducts.some(p => p.category === slug);
    if (inUse) { showToast('Cannot delete — products use this category.', 'error'); return; }
    if (!confirm('Delete this category?')) return;
    const { error } = await sb.from('categories').delete().eq('id', id);
    if (error) { showToast('Failed to delete.', 'error'); return; }
    showToast('Category deleted.', 'success');
    await loadCategories();
  }

  // TOAST
  let toastTimeout;
  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast visible ${type}`;
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => { el.classList.remove('visible'); }, 3000);
  }
</script>
</body>
</html>
